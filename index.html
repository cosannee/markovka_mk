<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лист ожидания · МК по пошиву мишки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* палитра с присланных фото — кремовый фон + пудрово-голубой акцент */
  --cream:#e9e4d4;
  --cream-soft:#f1ede1;
  --paper:#f6f3ea;
  --blue:#7a99c8;          /* пудрово-голубой */
  --blue-deep:#5d7fb4;
  --blue-soft:#dde5f1;
  --ink:#3a3a3a;
  --ink-soft:#6b6b66;
  --ink-faint:#9a968c;
  --line:#d9d3c1;
  --r:14px;
}
html,body{height:100%}
body{
  font-family:'Golos Text',sans-serif;
  color:var(--ink);
  background:var(--cream);
  font-size:16px;
  line-height:1.5;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px 16px;
}
.wrap{
  width:100%;
  max-width:480px;
}
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:24px;
  padding:40px 32px 32px;
  box-shadow:0 18px 50px rgba(90,80,60,.10);
}
/* ЛОГОТИП — сюда вставишь логотип Марковки */
.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:28px;
}
.logo img{max-height:56px;width:auto;display:block}
.logo-placeholder{
  width:120px;height:56px;
  border:1px dashed var(--blue);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--blue-deep);
  letter-spacing:.5px;
}
.eyebrow{
  text-align:center;
  font-size:12px;
  font-weight:600;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--blue-deep);
  margin-bottom:14px;
}
h1{
  width:fit-content;
  max-width:100%;
  margin:0 auto 14px;
}
.t-main{
  display:block;
  font-size:clamp(22px,6.4vw,28px);
  font-weight:700;
  line-height:1.12;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--blue-deep);
  white-space:nowrap;
  text-align:justify;
  text-align-last:justify;
}
.t-sub{
  display:block;
  font-size:clamp(12px,3.4vw,14px);
  font-weight:500;
  line-height:1.3;
  letter-spacing:1.6px;
  text-transform:uppercase;
  color:var(--blue);
  margin-top:8px;
  white-space:nowrap;
  text-align:justify;
  text-align-last:justify;
}
.lead{
  text-align:center;
  font-size:14px;
  font-weight:400;
  color:var(--ink-soft);
  margin-bottom:30px;
  padding:0 4px;
}
form{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:7px}
label{
  font-size:12.5px;
  font-weight:500;
  color:var(--ink-soft);
  letter-spacing:.2px;
}
label .req{color:var(--blue-deep)}
input,textarea,select{
  font-family:'Golos Text',sans-serif;
  font-size:15px;
  color:var(--ink);
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:13px 15px;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
  width:100%;
}
input::placeholder,textarea::placeholder{color:var(--ink-faint)}
input:focus,textarea:focus,select:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px var(--blue-soft);
}
textarea{resize:vertical;min-height:70px}
.hint{font-size:11.5px;color:var(--ink-faint);margin-top:-2px}
.btn{
  font-family:'Golos Text',sans-serif;
  font-size:16px;
  font-weight:600;
  letter-spacing:.3px;
  color:#fff;
  background:var(--blue-deep);
  border:none;
  border-radius:var(--r);
  padding:15px;
  cursor:pointer;
  transition:background .15s, transform .1s;
  margin-top:6px;
}
.btn:hover{background:#52739f}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.6;cursor:default}
.consent{
  display:flex;
  align-items:flex-start;
  gap:9px;
  font-size:11.5px;
  color:var(--ink-faint);
  line-height:1.4;
}
.consent input{width:16px;height:16px;margin-top:1px;flex-shrink:0;accent-color:var(--blue-deep)}
.foot{
  text-align:center;
  font-size:11px;
  color:var(--ink-faint);
  margin-top:22px;
  letter-spacing:.3px;
}
/* экран благодарности */
.done{
  display:none;
  text-align:center;
  padding:18px 0 8px;
}
.done .mark{
  width:64px;height:64px;border-radius:50%;
  background:var(--blue-soft);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-size:30px;color:var(--blue-deep);
}
.done h2{font-size:21px;font-weight:600;margin-bottom:10px;color:var(--ink)}
.done p{font-size:14px;color:var(--ink-soft);padding:0 8px}
.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@media(max-width:420px){
  .card{padding:32px 22px 26px;border-radius:20px}
  h1{font-size:22px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <!-- ЛОГОТИП: загрузи файл логотипа в ту же папку репозитория с именем logo.svg -->
    <div class="logo">
      <img src="logo.svg" alt="Марковка">
    </div>

    <div id="form-screen">
      <div class="eyebrow">Лист ожидания</div>
      <h1>
        <span class="t-main">МК по пошиву мишки</span>
        <span class="t-sub">по первым меркам вашего малыша</span>
      </h1>
      <p class="lead">Оставьте контакты — и мы напишем вам первыми, как только откроется запись на мастер-класс.</p>

      <form id="wl-form" autocomplete="on" novalidate>
        <div class="field">
          <label for="name">Имя <span class="req">*</span></label>
          <input id="name" name="name" type="text" placeholder="Как к вам обращаться" required>
        </div>

        <div class="field">
          <label for="phone">Номер телефона <span class="req">*</span></label>
          <input id="phone" name="phone" type="tel" inputmode="tel" placeholder="+7 (___) ___-__-__" required>
        </div>

        <div class="field">
          <label for="instagram">Instagram <span class="req">*</span></label>
          <input id="instagram" name="instagram" type="text" placeholder="@username" required>
        </div>

        <div class="field">
          <label for="comment">Комментарий</label>
          <textarea id="comment" name="comment" placeholder="Вопрос или пожелание (необязательно)"></textarea>
        </div>

        <label class="consent">
          <input type="checkbox" id="consent" required>
          <span>Согласен(а) на обработку персональных данных для связи по мастер-классу.</span>
        </label>

        <button class="btn" type="submit" id="submit-btn">Записаться в лист ожидания</button>
      </form>
    </div>

    <div class="done" id="done-screen">
      <div class="mark">✓</div>
      <h2>Вы в списке!</h2>
      <p>Спасибо. Мы свяжемся с вами, как только откроется запись на мастер-класс.</p>
    </div>

    <div class="foot">МАРКОВКА · с заботой и любовью</div>
  </div>
</div>

<script>
/* ============================================================
   ПОДКЛЮЧЕНИЕ К GOOGLE ТАБЛИЦАМ
   ------------------------------------------------------------
   1. Открой свою Google Таблицу → Расширения → Apps Script.
   2. Вставь код приёмника (пришлю отдельно / см. инструкцию).
   3. Опубликуй как веб-приложение (доступ: «Все»).
   4. Скопированную ссылку вставь сюда вместо PASTE_URL:
   ============================================================ */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwNVuvvs1qRKswMioGL1xPB-3ozXPOZryAGCsDdUu2-Nihgqpl_XJw_sxY4pnkM88RStw/exec';

const form = document.getElementById('wl-form');
const btn  = document.getElementById('submit-btn');

form.addEventListener('submit', async function(e){
  e.preventDefault();

  // простая валидация обязательных полей
  const required = ['name','phone','instagram'];
  let ok = true;
  required.forEach(function(id){
    const el = document.getElementById(id);
    if(!el.value.trim()){ ok=false; flash(el); }
  });
  const consent = document.getElementById('consent');
  if(!consent.checked){ ok=false; flash(consent); }
  if(!ok) return;

  const data = {
    name:      document.getElementById('name').value.trim(),
    phone:     document.getElementById('phone').value.trim(),
    instagram: document.getElementById('instagram').value.trim(),
    comment:   document.getElementById('comment').value.trim(),
    date:      new Date().toLocaleString('ru-RU')
  };

  btn.disabled = true;
  btn.textContent = 'Отправляем…';

  try{
    if(SHEET_URL && SHEET_URL !== 'PASTE_URL'){
      await fetch(SHEET_URL, {
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(data)
      });
    }
    showDone();
  }catch(err){
    // даже при ошибке сети показываем благодарность, данные лучше не терять — продублируй приём на бэке
    console.warn(err);
    showDone();
  }
});

function flash(el){
  const target = el.closest('.field') || el.closest('.consent') || el;
  target.classList.remove('shake');
  void target.offsetWidth;
  target.classList.add('shake');
}

function showDone(){
  document.getElementById('form-screen').style.display='none';
  document.getElementById('done-screen').style.display='block';
}
</script>
</body>
</html>
